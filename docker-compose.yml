version: '3.8'

services:
  # ========== База данных для метаданных MLflow ==========
  postgres:
    image: postgres:15
    container_name: mlflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432" # для внешнего доступа с консоли
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    # networks:
    #   - mlflow_network

  # ========== S3-совместимое хранилище артефактов ==========
  minio:
    image: minio/minio:latest
    container_name: mlflow_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      # - "9000:9000"  # API для программного доступа
      - "9001:9001"  # Веб-консоль MinIO
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    # networks:
    #   - mlflow_network

  # ========== Создание бакета в MinIO (одноразовая задача) ==========
  minio-create-bucket:
    image: minio/mc:latest
    container_name: mlflow_minio_bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb local/${ARTIFACTS_BUCKET_NAME} --ignore-existing;
      echo 'Bucket ${ARTIFACTS_BUCKET_NAME} created';
      exit 0;
      "
    # networks:
    #   - mlflow_network

  # ========== MLflow Tracking Server ==========
  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: mlflow_server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Настройки подключения к PostgreSQL
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Настройки подключения к MinIO (S3)
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      # Дополнительные настройки
      MLFLOW_S3_IGNORE_TLS: "true"
    command: >
      mlflow server
      --artifacts-destination s3://${ARTIFACTS_BUCKET_NAME}
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
    # networks:
    #   - mlflow_network

  # ========== FastAPI сервис для инференса ==========
  # fastapi:
  #   build:
  #     context: ./fastapi_service
  #     dockerfile: Dockerfile
  #   container_name: iris_fastapi
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     MLFLOW_TRACKING_URI: http://mlflow:5000
  #     MLFLOW_S3_ENDPOINT_URL: http://minio:9000
  #     AWS_ACCESS_KEY_ID: minioadmin
  #     AWS_SECRET_ACCESS_KEY: minioadmin
  #     MODEL_NAME: IrisClassifier
  #     MODEL_STAGE: Production
  #   depends_on:
  #     - mlflow
  #     - minio
  #   networks:
  #     - mlflow_network

# ========== Тома для хранения данных ==========
volumes:
  postgres_data:
    name: mlflow_postgres_data
  minio_data:
    name: mlflow_minio_data

